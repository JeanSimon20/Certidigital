# ======================================================
# CertiDigital Platform — application-test.yml
# ======================================================
# Perfil TEST — H2 en memoria (se destruye al terminar),
# Flyway sin datos ficticios (solo estructura).
# ======================================================

spring:
  datasource:
    url: jdbc:h2:mem:certidigital-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/seed
    clean-disabled: false

logging:
  level:
    root: WARN
    com.certidigital: INFO
    org.flywaydb: INFO
